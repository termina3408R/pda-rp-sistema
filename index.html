<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>PDA SECURE — Sistema de Asistencia Policial & Discord v6</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght={400;500;600;700}&family=Exo+2:wght={300;400;600;700}&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div id="app">
  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <div class="login-title">PDA SECURE LOGIN</div>
      
      <div class="field-group">
        <label class="field-label">Nombre de Agente</label>
        <input type="text" id="cnName" class="field-input" value="Agente Thompson" placeholder="Ej: H. policial"/>
      </div>
      
      <div class="field-group">
        <label class="field-label">Rango / Rol</label>
        <select id="cnRole" class="field-input">
          <option value="policia">Policía Nacional</option>
          <option value="ems">EMS / Emergencias</option>
          <option value="ejercito">Ejército</option>
          <option value="secreto">Unidad Secreta</option>
        </select>
      </div>
      
      <div class="field-group">
        <label class="field-label">ID Placa / Unidad</label>
        <input type="text" id="cnPlaca" class="field-input" value="ALPHA-12" placeholder="Ej: 025-X"/>
      </div>
      
      <button class="btn-login" onclick="doLogin()">Iniciar Sistema</button>
    </div>
  </div>

  <div id="mainDashboard" class="hidden">
    <header class="topbar">
      <button class="menu-toggle" onclick="toggleMenu()">☰</button>
      <div class="topbar-brand"><span class="brand-dot"></span>PDA SECURE v6</div>
      
      <div class="ws-status disconnected" id="wsStatus">
        <span class="ws-dot disconnected" id="wsDot"></span>
        <span id="wsLabel">SIN CONEXIÓN (DISCORD)</span>
      </div>

      <div class="topbar-right">
        <span id="clockDisplay">00:00:00</span>
        <span id="dateDisplay">—</span>
      </div>
    </header>

    <div class="main-wrapper">
      <div class="mobile-overlay" id="mobileOverlay" onclick="toggleMenu()"></div>
      
      <aside class="sidebar" id="sidebar">
        <div class="profile-banner">
          <div class="user-info">
            <div id="pfrName" class="u-name">—</div>
            <div id="pfrMeta" class="u-meta">—</div>
          </div>
          <button class="tts-tog on" id="ttsTog" onclick="toggleTTS()">VOZ ON</button>
        </div>

        <div class="nav-section">
          <div class="nav-label">Comunicaciones</div>
          <div class="ch-col" id="radioChannels"></div>
        </div>
        
        <div class="sidebar-footer">
          <div class="service-display">SERVICIO ACTIVE: <span id="serviceTime">00:00:00</span></div>
        </div>
      </aside>

      <main class="content-area">
        <div class="radio-wrap">
          <div class="radio-header">
            <span class="radio-title">RECEPTOR MULTICANAL (DISCORD FEED)</span>
            <span id="freqLabel" class="radio-freq">DISCORD LIVE</span>
          </div>
          
          <div class="chat-col">
            <div class="msgs-area" id="radioMsgs">
              <div class="loading-msg">Esperando flujo de datos...</div>
            </div>
          </div>

          <div class="radio-footer-controls">
            <input type="text" id="radioInput" class="field-input radio-input" placeholder="Transmitir mensaje al canal de Discord..." onkeydown="if(event.key==='Enter') sendRadioMsg()"/>
            <button class="btn-send" onclick="sendRadioMsg()">ENVIAR</button>
          </div>
        </div>
      </main>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>

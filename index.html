<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PDA SECURE SYSTEM</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <div id="loginScreen" class="login-container">
            <div class="login-box">
                <div class="login-logo">🛡️</div>
                <h1 class="login-title">SISTEMA PDA</h1>
                <p class="login-subtitle">UNIDAD DE FUERZAS DE SEGURIDAD</p>
                
                <div class="auth-section">
                    <p style="font-size: 10px; color: #888; margin-bottom: 20px; letter-spacing: 2px;">AUTENTICACIÓN REQUERIDA</p>
                    
                    <button onclick="loginWithDiscord()" class="btn-discord">
                        <img src="https://assets-global.website-files.com/6257adef93867e3c8458b8c0/6257af073a344d2165034079_icon_clyde_blurple_RGB.svg" width="20" style="margin-right: 10px;">
                        ENTRAR CON DISCORD
                    </button>
                </div>
                
                <div id="loginErr" class="error-msg"></div>
            </div>
        </div>

        <div id="mainInterface" style="display:none;">
            <div class="topbar">
                <div class="brand">⬡ PDA SECURE</div>
                
                <div class="user-info-top">
                    <div class="user-details">
                        <span id="userName" class="name-text">Cargando...</span>
                        <span id="userRank" class="rank-text">IDENTIFICANDO...</span>
                    </div>
                    <img id="userAvatar" src="" alt="Perfil" class="avatar-img">
                </div>

                <div class="actions">
                    <button onclick="toggleFullScreen()" class="btn-tool">⛶</button>
                </div>
            </div>

            <div class="main-body">
                <aside class="sidebar" id="sidebar">
                    </aside>
                
                <main class="content-area" id="contentArea">
                    <div class="welcome-msg">
                        <h2>Sistema Operativo Inicializado</h2>
                        <p>Seleccione una opción del menú lateral para comenzar.</p>
                    </div>
                </main>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

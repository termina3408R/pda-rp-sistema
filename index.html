<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PDA Secure System - Discord Auth</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="loginScreen">
            <div class="login-logo" style="font-size:50px;margin-bottom:10px;">🛡</div>
            <div class="login-title" style="font-size:22px;font-weight:bold;letter-spacing:3px;">SISTEMA PDA</div>
            <div class="login-sub" style="font-size:10px;color:#888;margin-bottom:30px;">ACCESO CENTRALIZADO PARA FACCIONES</div>
            
            <div class="login-card">
                <button class="btn-login" onclick="loginWithDiscord()" style="background:#5865F2; display:flex; align-items:center; justify-content:center; gap:12px; border:none; padding:15px; color:#fff; font-weight:bold; width:100%; cursor:pointer; border-radius:4px;">
                    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png" width="20" style="filter:invert(1);">
                    ENTRAR CON DISCORD
                </button>
                <div id="loginStatus" style="font-size:10px; margin-top:15px; color:#555;">SISTEMA DE VERIFICACIÓN AUTOMÁTICA</div>
            </div>
        </div>

        <div id="mainInterface" style="display:none; flex-direction:column;">
            <div class="topbar">
                <div style="display:flex; align-items:center; gap:15px;">
                    <div class="topbar-brand">⬡ PDA SECURE</div>
                    <button onclick="toggleFullScreen()" class="btn-fullscreen">全 PANTALLA COMPLETA</button>
                </div>
                <div id="userInfo" style="display:flex; align-items:center; gap:10px;">
                    <div style="text-align:right;">
                        <div id="userName" style="font-size:13px; font-weight:bold;">Cargando...</div>
                        <div id="userRank" style="font-size:9px; color:var(--acc2);">VERIFICANDO RANGO</div>
                    </div>
                    <img id="userAvatar" src="" width="35" style="border-radius:50%; border:1px solid var(--acc);">
                </div>
            </div>
            <div class="main-body">
                <div class="sidebar" id="sidebar"></div>
                <div class="content" id="contentArea"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
